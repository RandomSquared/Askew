<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Askew - Teacher Dashboard</title>
    <!-- Link to external CSS file for styling -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main container for teacher interface -->
    <div class="container">
        <h1>Askew - Teacher Dashboard</h1>
        
        <!-- Display logged in teacher information -->
        <p id="teacher-info"></p>
        
        <!-- Dashboard section (shown by default since teacher is logged in) -->
        <div id="dashboard-section">
            <h2>Dashboard</h2>
            <h3 id="welcome-message"></h3>
            
            <!-- Section for creating a new class -->
            <div id="create-class-section">
                <h3>Create Class</h3>
                <!-- Input for class name -->
                <input type="text" id="class-name" placeholder="Class name">
                <!-- Button to create class -->
                <button onclick="createClass()">Create Class</button>
                <!-- Display generated class code -->
                <p id="class-code-display"></p>
            </div>
            
            <!-- Section for managing marking sessions -->
            <div id="marking-section">
                <h3>Marking Session</h3>
                <!-- Dropdown to select class -->
                <select id="class-select" onchange="loadEnrolledStudents()">
                    <option value="">Select a class</option>
                </select>
                
                <!-- Enrolled students display -->
                <div id="enrolled-students" style="display: none;">
                    <h4>Enrolled Students</h4>
                    <ul id="enrolled-list"></ul>
                </div>
                
                <!-- Button to begin marking -->
                <button onclick="beginMarking()">Begin Marking</button>
                
                <!-- Button to close marking (hidden until marking starts) -->
                <button id="close-marking-button" onclick="closeMarking()" style="display: none;">Close Marking</button>
                
                <!-- Attendance statistics display -->
                <div id="attendance-stats" style="display: none;">
                    <h4>Attendance Statistics</h4>
                    <p>Present: <span id="present-count">0</span></p>
                    <p>Absent: <span id="absent-count">0</span></p>
                    <ul id="attendance-list"></ul>
                </div>
            </div>
        </div>
                <!-- Logout button -->
        <div class="button-row">
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    
    <!-- Load shared utilities -->
    <script src="shared.js"></script>
    <!-- Initialize dark mode -->
    <script>
        initializeDarkMode();
    </script>
    <!-- Load teacher-specific logic -->
    <script src="teacher.js"></script>
</body>
</html>
