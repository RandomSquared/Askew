<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <!-- Link to external CSS file for styling -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main container for the main menu -->
    <div class="container">
        <h1>Welcome to Askew</h1>
        
        <!-- Navigation buttons card -->
        <div class="card">
            <div class="button-row">
                <!-- Button to navigate to student login -->
                <button id="btn-student-login" onclick="window.location.href='login.html?type=student-login'">Student Login</button>
                
                <!-- Button to navigate to student signup -->
                <button id="btn-student-signup" onclick="window.location.href='login.html?type=student-signup'">Student Sign Up</button>
                
                <!-- Button to navigate to teacher login -->
                <button id="btn-teacher-login" onclick="window.location.href='login.html?type=teacher-login'">Teacher Login</button>
            </div>
        </div>
    </div>
    
    <!-- Load main menu logic -->
    <script src="index.js"></script>
</body>
</html>
