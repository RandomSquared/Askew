<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Askew - Student Dashboard</title>
    <!-- Link to external CSS file for styling -->
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS Client for Authentication -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Main container for student interface -->
    <div class="container">
        <h1>Askew - Student Dashboard</h1>
        
        <!-- Display logged in student information -->
        <div id="student-info" class="student-info-card">
            <p><strong>Name:</strong> <span id="student-name"></span></p>
            <p><strong>Student ID:</strong> <span id="student-id" class="student-id-highlight"></span></p>
            <p><strong>Email:</strong> <span id="student-email"></span></p>
        </div>
        
        
        <!-- Section for joining a class -->
        <div id="join-section">
            <h2>Join Class</h2>
            <!-- Input for class code -->
            <input type="text" id="class-code" placeholder="Enter class code">
            <!-- Button to join the class -->
            <button onclick="joinClass()">Join Class</button>
        </div>
        
        <!-- Section for marking attendance (hidden by default) -->
        <div id="marking-section" style="display: none;">
            <h2>Waiting for teacher to start marking...</h2>
            <p id="class-info"></p>
            
            <!-- Mark attendance button (hidden until signal received) -->
            <button id="mark-button" onclick="markAttendance()" style="display: none;">Mark Me Here</button>
            
            <!-- Status message display -->
            <p id="status-message"></p>
        </div>
                <!-- Navigation buttons -->
        <div class="button-row">
            <button onclick="backToDashboard()">Back to Dashboard</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
    
    <!-- Load shared utilities -->
    <script src="shared.js"></script>
    <!-- Initialize dark mode -->
    <script>
        initializeDarkMode();
    </script>
    <!-- Load student-specific logic -->
    <script src="student.js"></script>
</body>
</html>
