<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Attendance System</title>
    <!-- Link to external CSS file for styling -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main container for student interface -->
    <div class="container">
        <h1>Student Attendance</h1>
        
        <!-- Display logged in student information -->
        <p id="student-info"></p>
        
        <!-- Logout button -->
        <button class="secondary" onclick="logout()">Logout</button>
        
        <!-- Section for joining a class -->
        <div id="join-section" class="card">
            <h2>Join Class</h2>
            <!-- Input for class code -->
            <input type="text" id="class-code" placeholder="Enter class code">
            <!-- Button to join the class -->
            <button onclick="joinClass()">Join Class</button>
        </div>
        
        <!-- Section for marking attendance (hidden by default) -->
        <div id="marking-section" class="card" style="display: none;">
            <h2>Waiting for teacher to start marking...</h2>
            <p id="class-info"></p>
            
            <!-- Mark attendance button (hidden until signal received) -->
            <button id="mark-button" onclick="markAttendance()" style="display: none;">Mark Me Here</button>
            
            <!-- Status message display -->
            <p id="status-message"></p>
        </div>
        
        <!-- Button to return to main menu -->
        <button class="secondary" onclick="window.location.href='index.html'">Back to Main Menu</button>
    </div>
    
    <!-- Load shared utilities -->
    <script src="shared.js"></script>
    <!-- Load student-specific logic -->
    <script src="student.js"></script>
</body>
</html>
